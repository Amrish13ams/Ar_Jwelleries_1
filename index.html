<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Jewelry Try-On</title>
    <style>
        :root {
            --accent: #facc15;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* UI Overlays */
        .ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Glassmorphism Styles */
        .glass-btn {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: #fff;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .glass-btn:active {
            transform: scale(0.95);
        }

        /* Layout */
        .top-right {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .bottom-right {
            position: absolute;
            bottom: 32px;
            right: 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .menu-items {
            display: none;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 10px;
            flex-direction: column;
            gap: 8px;
            border: 1px solid var(--glass-border);
        }

        .menu-items.active {
            display: flex;
        }

        .main-toggle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(250, 204, 21, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; letter-spacing: 2px; font-size: 12px; text-transform: uppercase;">Loading AR Experience</p>
    </div>

    <video id="video" playsinline muted style="display:none"></video>
    <canvas id="canvas"></canvas>

    <div class="ui-layer">
        <!-- Top controls -->
        <div class="top-right interactive">
            <label class="glass-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>Upload PNG</span>
                <input type="file" id="fileInput" accept="image/png" style="display: none;">
            </label>
            <button id="resetBtn" class="glass-btn hidden" style="background: rgba(239, 68, 68, 0.4); border-radius: 50%; width: 44px; padding: 0; justify-content: center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </div>

        <!-- Bottom Menu -->
        <div class="bottom-right interactive">
            <div id="menuItems" class="menu-items">
                <button class="glass-btn type-select" data-type="ring">Ring</button>
                <button class="glass-btn type-select" data-type="earrings">Earrings</button>
                <button class="glass-btn type-select" data-type="necklace">Necklace</button>
            </div>
            <button id="menuToggle" class="main-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loader = document.getElementById('loader');
        
        let faceLandmarker, handLandmarker;
        let currentType = 'necklace';
        let customImage = null;
        const assets = {
            necklace: 'https://hebbkx1anhila5yf.public.blob.vercel-storage.com/necless-removebg-preview-eKz2jodGH8N7T3A6C0R7P8ArJP6J6b.png',
            earrings: 'https://img.icons8.com/color/512/earrings.png',
            ring: 'https://img.icons8.com/color/512/diamond-ring.png'
        };

        let jewelryImg = new Image();
        jewelryImg.crossOrigin = "anonymous";
        jewelryImg.src = assets.necklace;

        async function init() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO"
                });

                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO"
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    loader.classList.add('hidden');
                    render();
                };
            } catch (err) {
                console.error(err);
                alert("Please ensure you are using HTTPS and have allowed camera access.");
            }
        }

        function render() {
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            const vW = video.videoWidth;
            const vH = video.videoHeight;
            const vRatio = vW / vH;
            const cRatio = canvas.width / canvas.height;

            let dW, dH, dX, dY;
            if (vRatio > cRatio) {
                dH = canvas.height; dW = canvas.height * vRatio;
                dX = (canvas.width - dW) / 2; dY = 0;
            } else {
                dW = canvas.width; dH = canvas.width / vRatio;
                dX = 0; dY = (canvas.height - dH) / 2;
            }

            // Draw Mirror Video
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, dX, dY, dW, dH);
            ctx.restore();

            const now = Date.now();
            const mapX = (nx) => (1 - nx) * dW + dX;
            const mapY = (ny) => ny * dH + dY;

            if (jewelryImg.complete) {
                if (currentType === 'ring') {
                    const results = handLandmarker.detectForVideo(video, now);
                    results.landmarks?.forEach(pts => {
                        const mcp = pts[13], pip = pts[14];
                        const mX = mapX(mcp.x), mY = mapY(mcp.y), pX = mapX(pip.x), pY = mapY(pip.y);
                        const cX = (mX + pX) / 2, cY = (mY + pY) / 2;
                        
                        // Calculate base distance and apply a scale factor to reduce overall size
                        const baseDist = Math.sqrt(Math.pow(mX-pX,2) + Math.pow(mY-pY,2));
                        const ringWidth = baseDist * 0.55; // Reduced further from 0.75 to 0.55
                        const ringHeight = ringWidth * (jewelryImg.height/jewelryImg.width);
                        const angle = Math.atan2(pY - mY, pX - mX);
                        
                        ctx.save();
                        ctx.translate(cX, cY);
                        ctx.rotate(angle + Math.PI/2);
                        ctx.drawImage(jewelryImg, -ringWidth/2, -ringHeight/2, ringWidth, ringHeight);
                        ctx.restore();
                    });
                } else {
                    const results = faceLandmarker.detectForVideo(video, now);
                    if (results.faceLandmarks?.[0]) {
                        const lms = results.faceLandmarks[0];
                        if (currentType === 'necklace') {
                            const jawL = lms[172], jawR = lms[397], chin = lms[152];
                            const w = Math.abs(mapX(jawL.x) - mapX(jawR.x)) * 1.8;
                            const h = (jewelryImg.height/jewelryImg.width) * w;
                            ctx.drawImage(jewelryImg, (mapX(jawL.x)+mapX(jawR.x))/2 - w/2, mapY(chin.y) - h*0.1, w, h);
                        } else if (currentType === 'earrings') {
                            const lE = lms[361], rE = lms[132], head = lms[10], chin = lms[152];
                            const sz = Math.abs(mapY(head.y) - mapY(chin.y)) * 0.15;
                            const h = (jewelryImg.height/jewelryImg.width) * sz;
                            ctx.drawImage(jewelryImg, mapX(lE.x) - sz/2, mapY(lE.y), sz, h);
                            ctx.drawImage(jewelryImg, mapX(rE.x) - sz/2, mapY(rE.y), sz, h);
                        }
                    }
                }
            }

            requestAnimationFrame(render);
        }

        // UI Listeners
        document.getElementById('menuToggle').onclick = () => document.getElementById('menuItems').classList.toggle('active');
        
        document.querySelectorAll('.type-select').forEach(btn => {
            btn.onclick = () => {
                currentType = btn.dataset.type;
                if (!customImage) jewelryImg.src = assets[currentType];
                document.getElementById('menuItems').classList.remove('active');
            };
        });

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                customImage = URL.createObjectURL(file);
                jewelryImg.src = customImage;
                document.getElementById('resetBtn').classList.remove('hidden');
            }
        };

        document.getElementById('resetBtn').onclick = () => {
            customImage = null;
            jewelryImg.src = assets[currentType];
            document.getElementById('resetBtn').classList.add('hidden');
        };

        window.onload = init;
    </script>
</body>
</html>
