<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Jewelry Try-On</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
}

#menu{
position:absolute;
bottom:30px;
right:30px;
display:flex;
flex-direction:column;
gap:10px;
}

button{
background:rgba(255,255,255,0.2);
border:none;
color:white;
padding:12px 18px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

#status{
position:absolute;
bottom:30px;
left:30px;
background:rgba(0,0,0,0.4);
padding:8px 16px;
border-radius:20px;
font-size:12px;
}

#loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
font-size:18px;
}
</style>

</head>
<body>

<div id="loading">Loading AR Engine...</div>

<video id="video" playsinline muted style="display:none"></video>
<canvas id="canvas"></canvas>

<div id="menu">
<button onclick="setType('necklace')">Necklace</button>
<button onclick="setType('earrings')">Earrings</button>
<button onclick="setType('ring')">Ring</button>
</div>

<div id="status">necklace Try-On</div>

<script type="module">

import {
FaceLandmarker,
HandLandmarker,
FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let faceLandmarker;
let handLandmarker;

let type="necklace";

const assets={
necklace:"https://img.icons8.com/color/512/necklace.png",
earrings:"https://img.icons8.com/color/512/earrings.png",
ring:"https://img.icons8.com/color/512/diamond-ring.png"
};

const jewelry=new Image();
jewelry.crossOrigin="anonymous";
jewelry.src=assets[type];

window.setType=(t)=>{
type=t;
document.getElementById("status").innerText=t+" Try-On";
jewelry.src=assets[t];
};

async function init(){

const vision=await FilesetResolver.forVisionTasks(
"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
);

faceLandmarker=await FaceLandmarker.createFromOptions(vision,{
baseOptions:{
modelAssetPath:
"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
delegate:"GPU"
},
runningMode:"VIDEO",
numFaces:1
});

handLandmarker=await HandLandmarker.createFromOptions(vision,{
baseOptions:{
modelAssetPath:
"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
delegate:"GPU"
},
runningMode:"VIDEO",
numHands:2
});

document.getElementById("loading").style.display="none";

startCamera();
render();

}

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user",width:1280,height:720}
});

video.srcObject=stream;
await video.play();

}

function render(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

ctx.save();
ctx.translate(canvas.width,0);
ctx.scale(-1,1);
ctx.drawImage(video,0,0,canvas.width,canvas.height);
ctx.restore();

if(type==="ring"){

const result=handLandmarker.detectForVideo(video,performance.now());

if(result.landmarks){

result.landmarks.forEach(lm=>{

const x=canvas.width*(1-lm[13].x);
const y=canvas.height*lm[13].y;

ctx.drawImage(jewelry,x-40,y-40,80,80);

});

}

}else{

const result=faceLandmarker.detectForVideo(video,performance.now());

if(result.faceLandmarks){

const lms=result.faceLandmarks[0];

if(type==="necklace"){

const x=canvas.width*(1-lms[152].x);
const y=canvas.height*lms[152].y;

ctx.drawImage(jewelry,x-120,y,240,120);

}

if(type==="earrings"){

const lx=canvas.width*(1-lms[361].x);
const ly=canvas.height*lms[361].y;

const rx=canvas.width*(1-lms[132].x);
const ry=canvas.height*lms[132].y;

ctx.drawImage(jewelry,lx-30,ly,60,60);
ctx.drawImage(jewelry,rx-30,ry,60,60);

}

}

}

requestAnimationFrame(render);

}

init();

</script>

</body>
</html>
