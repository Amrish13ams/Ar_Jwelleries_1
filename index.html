<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Jewelry Try-On</title>

<!-- React CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

button{
cursor:pointer;
border:none;
}

#root{
width:100vw;
height:100vh;
}

.menu{
position:absolute;
bottom:30px;
right:30px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
color:white;
padding:12px 20px;
border-radius:20px;
font-weight:600;
}

.upload{
position:absolute;
top:20px;
right:20px;
}

.status{
position:absolute;
bottom:30px;
left:30px;
background:rgba(0,0,0,0.4);
padding:8px 14px;
border-radius:20px;
color:#fff;
font-size:12px;
letter-spacing:1px;
}

.loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useRef,useState,useEffect}=React;

function App(){

const videoRef=useRef(null);
const canvasRef=useRef(null);
const jewelryImg=useRef(null);

const [face,setFace]=useState(null);
const [hand,setHand]=useState(null);

const [type,setType]=useState("necklace");
const [upload,setUpload]=useState(null);
const [loading,setLoading]=useState(true);

const assets={
necklace:"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/necless-removebg-preview-eKz2jodGH8N7T3A6C0R7P8ArJP6J6b.png",
earrings:"https://img.icons8.com/color/512/earrings.png",
ring:"https://img.icons8.com/color/512/diamond-ring.png"
};

useEffect(()=>{

async function load(){

const {FaceLandmarker,HandLandmarker,FilesetResolver}
=await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm");

const vision=await FilesetResolver.forVisionTasks(
"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
);

const faceLM=await FaceLandmarker.createFromOptions(vision,{
baseOptions:{
modelAssetPath:
"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
delegate:"GPU"
},
runningMode:"VIDEO",
numFaces:1
});

const handLM=await HandLandmarker.createFromOptions(vision,{
baseOptions:{
modelAssetPath:
"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
delegate:"GPU"
},
runningMode:"VIDEO",
numHands:2
});

setFace(faceLM);
setHand(handLM);
setLoading(false);
}

load();

},[]);

useEffect(()=>{

navigator.mediaDevices.getUserMedia({
video:{facingMode:"user",width:1280,height:720}
}).then(stream=>{
videoRef.current.srcObject=stream;
videoRef.current.play();
});

},[]);

useEffect(()=>{

const img=new Image();
img.crossOrigin="anonymous";
img.src=upload || assets[type];
img.onload=()=>{jewelryImg.current=img};

},[type,upload]);

useEffect(()=>{

if(!face||!hand)return;

const canvas=canvasRef.current;
const ctx=canvas.getContext("2d");

function loop(){

const video=videoRef.current;

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

ctx.save();
ctx.translate(canvas.width,0);
ctx.scale(-1,1);
ctx.drawImage(video,0,0,canvas.width,canvas.height);
ctx.restore();

const img=jewelryImg.current;

if(img){

if(type==="ring"){

const result=hand.detectForVideo(video,performance.now());

if(result.landmarks){

result.landmarks.forEach(lm=>{

const x=canvas.width*(1-lm[13].x);
const y=canvas.height*lm[13].y;

ctx.drawImage(img,x-40,y-40,80,80);

});

}

}else{

const result=face.detectForVideo(video,performance.now());

if(result.faceLandmarks){

const lms=result.faceLandmarks[0];

if(type==="necklace"){

const x=canvas.width*(1-lms[152].x);
const y=canvas.height*lms[152].y;

ctx.drawImage(img,x-120,y,240,120);

}

if(type==="earrings"){

const lx=canvas.width*(1-lms[361].x);
const ly=canvas.height*lms[361].y;

const rx=canvas.width*(1-lms[132].x);
const ry=canvas.height*lms[132].y;

ctx.drawImage(img,lx-30,ly,60,60);
ctx.drawImage(img,rx-30,ry,60,60);

}

}

}

}

requestAnimationFrame(loop);

}

loop();

},[face,hand,type]);

function uploadFile(e){

const f=e.target.files[0];
if(f)setUpload(URL.createObjectURL(f));

}

if(loading){

return <div className="loading">Loading AR Engine...</div>

}

return(

<div>

<video ref={videoRef} style={{display:"none"}} playsInline muted></video>

<canvas ref={canvasRef}></canvas>

<div className="upload">

<input type="file" accept="image/png" onChange={uploadFile}/>

</div>

<div className="menu">

<button className="btn" onClick={()=>setType("necklace")}>
Necklace
</button>

<button className="btn" onClick={()=>setType("earrings")}>
Earrings
</button>

<button className="btn" onClick={()=>setType("ring")}>
Ring
</button>

</div>

<div className="status">
{type} Try-On
</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
